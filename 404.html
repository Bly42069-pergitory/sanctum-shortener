<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Redirecting… · Master Sanctum Restoration</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              marble: { dark: "#141416", mid: "#1c1c1e", light: "#2c2c2e", vein: "#3a3a3c" },
              gold: { DEFAULT: "#c9a227", light: "#e8d48b", dark: "#8b6914", brass: "#b5a642" },
              stone: { DEFAULT: "#e8e6e3", muted: "#9a9690" },
            },
            fontFamily: {
              display: ["Cormorant Garamond", "Georgia", "serif"],
              sans: ["Inter", "system-ui", "sans-serif"],
            },
          },
        },
      };
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <style>
      body { background: radial-gradient(ellipse 120% 80% at 50% -10%, #3a3a3c 0%, #1c1c1e 45%, #0e0e10 100%); }
      .marble-grain { background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.045'/%3E%3C/svg%3E"); }
      .gold-line { background: linear-gradient(90deg, transparent, #8b6914, #e8d48b, #c9a227, #e8d48b, #8b6914, transparent); height: 1px; }
      @keyframes pulse-ring { 0%, 100% { opacity: 0.5; transform: scale(1); } 50% { opacity: 1; transform: scale(1.04); } }
      .pulse-ring { animation: pulse-ring 2.2s ease-in-out infinite; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/js-yaml@4/dist/js-yaml.min.js"></script>
    <script>
      var LINKS_YML_PATH = "links.yml";
      var SITE_NAME = "Master Sanctum Restoration";

      function isUrl(url) {
        return /^https?:\/\/(www\.)?[-a-zA-Z0-9@:%._\+~#=]{2,256}\.[a-z]{2,24}\b([-a-zA-Z0-9@:%_\+.~#?&//=]*)+$/.test(url);
      }

      function getPathSegments() {
        return window.location.pathname.split("/").filter(Boolean);
      }

      function getPathSegmentsToSkip() {
        var segments = getPathSegments();
        if (window.location.hostname.endsWith("github.io") && segments.length > 1) return 1;
        return 0;
      }

      function getSlug() {
        var segments = getPathSegments();
        return segments[getPathSegmentsToSkip()] || "";
      }

      function getSiteBasePath() {
        var skip = getPathSegmentsToSkip();
        if (skip === 0) return "/";
        var segments = getPathSegments();
        return "/" + segments.slice(0, skip).join("/") + "/";
      }

      function getHomepage() {
        var loc = window.location;
        return loc.protocol + "//" + loc.hostname + (loc.port ? ":" + loc.port : "") + getSiteBasePath();
      }

      function getLinksYamlUrl() {
        var base = getSiteBasePath();
        return base === "/" ? "/" + LINKS_YML_PATH : base + LINKS_YML_PATH;
      }

      function resolveDestination(links, slug) {
        if (!slug || !links) return null;
        var value = links[slug];
        if (!value) return null;
        if (typeof value === "string") return isUrl(value) ? value : null;
        if (typeof value === "object" && value.url && isUrl(value.url)) return value.url;
        return null;
      }

      function showMiss(slug) {
        document.getElementById("redirect-state").classList.add("hidden");
        document.getElementById("miss-state").classList.remove("hidden");
        var slugEl = document.getElementById("miss-slug");
        if (slugEl) slugEl.textContent = slug ? "/" + slug : "(empty)";
      }

      function redirect() {
        var slug = getSlug();
        if (!slug) {
          window.location.replace(getHomepage());
          return;
        }

        var xhr = new XMLHttpRequest();
        xhr.onload = function () {
          try {
            var links = jsyaml.load(xhr.response);
            var destination = resolveDestination(links, slug);
            if (destination) {
              var destHost = document.createElement("a");
              destHost.href = destination;
              if (destHost.hostname === window.location.hostname) {
                showMiss(slug);
                return;
              }
              window.location.replace(destination);
            } else {
              showMiss(slug);
            }
          } catch (e) {
            showMiss(slug);
          }
        };
        xhr.onerror = function () { showMiss(slug); };
        xhr.open("GET", getLinksYamlUrl());
        xhr.send();
      }

      document.addEventListener("DOMContentLoaded", redirect);
    </script>
  </head>
  <body class="min-h-screen text-stone font-sans antialiased marble-grain">
    <div id="redirect-state" class="min-h-screen flex flex-col items-center justify-center px-6">
      <div class="pulse-ring mb-8">
        <img src="assets/logo-msr.png" alt="" width="88" height="88" class="mx-auto drop-shadow-[0_0_28px_rgba(201,162,39,0.35)]" />
      </div>
      <p class="font-display text-2xl text-gold-light tracking-wide">Redirecting…</p>
      <p class="mt-2 text-stone-muted text-sm">Master Sanctum Restoration</p>
    </div>

    <div id="miss-state" class="hidden min-h-screen flex flex-col items-center justify-center px-6">
      <div class="w-full max-w-md text-center">
        <img src="assets/logo-msr.png" alt="MSR" width="80" height="80" class="mx-auto mb-6 opacity-90" />
        <h1 class="font-display text-3xl text-gold-light font-semibold tracking-wide">Link Not Found</h1>
        <div class="gold-line w-32 mx-auto my-4"></div>
        <p class="text-stone-muted text-sm mb-1">No destination configured for</p>
        <p id="miss-slug" class="font-mono text-gold text-lg mb-6">/…</p>
        <p class="text-stone-muted text-sm leading-relaxed mb-8">
          This short link does not exist in <code class="text-gold/80">links.yml</code>.
        </p>
        <a id="home-link" href="/" class="inline-block px-8 py-3 border border-gold/40 text-gold-light font-display text-lg tracking-wider hover:bg-gold/10 hover:border-gold transition-colors duration-300">
          Return Home
        </a>
      </div>
      <p class="mt-16 text-stone-muted/60 text-xs tracking-widest uppercase">Protecting What Endures</p>
    </div>
    <script>document.getElementById("home-link").href = getHomepage();</script>
  </body>
</html>
